<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Onetouch Enhancer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 220px;
      background: #0c0618; /* Deep dark blue-tinted base */
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 13px;
      padding: 14px;
    }
    .header {
      display:flex; align-items:center; gap:8px;
      margin-bottom:12px; padding-bottom:10px;
      border-bottom:1px solid rgba(196,226,245,0.08);
    }
    .logo {
      width:26px; height:26px;
      background: linear-gradient(135deg, #2C5EAD, #1591DC); /* Blue theme gradient */
      border: 1px solid rgba(75, 184, 250, 0.35);
      border-radius: 5px; display:flex;
      align-items: center; justify-content:center; font-size:13px;
    }
    .title { font-size:12px; font-weight:700; color:#c4e2f5; } /* Updated to clear sky blue */
    .subtitle { 
      font-size:9px; 
      color: rgba(196, 226, 245, 0.5); 
      display: flex;
      align-items: center;
      gap: 3px;
      margin-top: 1px;
    }
    .subtitle svg { width: 9px; height: 9px; fill: #ffffff; opacity: 0.8; }
    .hint {
      font-size:10px; color: rgba(196, 226, 245, 0.7);
      background: rgba(21, 145, 220, 0.08);
      border: 1px solid rgba(75, 184, 250, 0.18);
      border-radius: 5px; padding: 7px 10px;
      text-align:center; line-height:1.5;
    }
    .hint kbd {
      display:inline-block;
      background: rgba(21, 145, 220, 0.15);
      border: 1px solid rgba(75, 184, 250, 0.35);
      border-radius: 3px; padding:1px 6px;
      font-size:10px; font-weight:700; color: #4BB8FA;
    }
    .footer {
      margin-top:12px; 
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size:9px; 
      color: #ffffff; /* White watermark text */
      opacity: 0.8;
    }
    .footer svg { width: 10px; height: 10px; fill: #ffffff; } /* White vector icon */
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚙️</div>
    <div>
      <div class="title">Onetouch Enhancer</div>
      <div class="subtitle">

        @monumeeent
      </div>
    </div>
  </div>
  <div class="hint">
    Press <kbd>Ctrl+\</kbd> on any<br/>
    streaming player page to open<br/>the settings panel

</body>
</html>
